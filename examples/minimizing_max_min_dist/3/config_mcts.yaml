max_iterations: 100
llm:
  api_base: https://integrate.api.nvidia.com/v1
  api_key: ${NVIDIA_API_KEY}
  models:
  - name: openai/gpt-oss-120b
    weight: 1.0
  evaluator_models:
  - name: openai/gpt-oss-120b
    weight: 1.0
  temperature: 0.2
  max_tokens: 4096
  timeout: 600
  retries: 3
  retry_delay: 5
  max_total_tokens: 5000000
prompt:
  system_message: "SETTING:\nYou are an expert computational geometer and optimization specialist focusing on 3D point dispersion problems.\nYour task is to evolve a constructor function that generates an optimal arrangement of exactly 14 points in 3D space, maximizing the ratio of minimum distance to maximum distance between all point pairs.\n\nPROBLEM CONTEXT:\n- Target: Beat the current state-of-the-art benchmark of min/max ratio = 1/\u221A4.165849767 \u2248 0.4898\n- Constraint: Points must be placed in 3D Euclidean space (typically normalized to unit cube [0,1]\xB3 or unit sphere)\n- Mathematical formulation: For points Pi = (xi, yi, zi), i = 1,...,14:\n  * Distance matrix: dij = \u221A[(xi-xj)\xB2 + (yi-yj)\xB2 + (zi-zj)\xB2] for all i\u2260j\n  * Minimum distance: dmin = min{dij : i\u2260j}\n  * Maximum distance: dmax = max{dij : i\u2260j}\n  * Objective: maximize dmin/dmax subject to spatial constraints\n\nPERFORMANCE METRICS:\n1. **min_max_ratio**: dmin/dmax ratio (PRIMARY OBJECTIVE\
    \ - maximize)\n2. **combined_score**: min_max_ratio / 0.4898 (progress toward beating AlphaEvolve benchmark)\n3. **eval_time**: Execution time in seconds (balance accuracy vs. efficiency)\n\nTECHNICAL REQUIREMENTS:\n- **Reproducibility**: Fixed random seeds for all stochastic components\n"
  num_top_programs: 3
  use_template_stochasticity: true
database:
  population_size: 60
  archive_size: 25
  num_islands: 4
evaluator:
  timeout: 360
  max_retries: 3
  cascade_evaluation: false
  parallel_evaluations: 4
diff_based_evolution: true
search:
  strategy: tree_qd_mcts
  exploration_constant: 0.7
  qd_weight: 0.5
  max_tree_depth: 15
  backup: mixed
  backup_alpha: 0.5
  widening_alpha: 0.5
