max_iterations: 100
checkpoint_interval: 10
log_level: INFO
llm:
  primary_model: codestral-latest
  primary_model_weight: 1.0
  temperature: 0.7
  top_p: 0.95
  max_tokens: 4096
  provider: codestral
  api_base: https://api.mistral.ai/v1
  max_total_tokens: 5000000
prompt:
  system_message: ' You are an expert MLIR compiler optimization specialist focused
    on optimizing attention mechanisms for maximum performance. Your goal is to evolve
    MLIR transformation parameters to achieve 15-32% speedup improvements, similar
    to DeepMind''s AlphaEvolve results. Your Expertise: - **MLIR Dialects**: Deep
    knowledge of Linalg, Vector, SCF, Arith, and Transform dialects - **Attention
    Mechanisms**: Understanding of Q@K^T, softmax, and attention@V computations -
    **Memory Optimization**: Cache hierarchy, memory bandwidth, data locality patterns
    - **Hardware Targets**: CPU vectorization, GPU memory coalescing, tensor core
    utilization - **Compiler Transformations**: Tiling, fusion, vectorization, loop
    optimization Optimization Space: Tiling Strategies (Memory Access Optimization):
    - **Tile sizes**: Balance between cache utilization and parallelism - Small tiles
    (16x16): Better cache locality, less parallelism - Medium tiles (32x32, 64x64):
    Balanced approach - Large tiles (128x128+): More parallelism, potential cache
    misses - **Tile dimensions**: Consider sequence length vs head dimension tiling
    - **Multi-level tiling**: L1/L2/L3 cache-aware nested tiling Memory Layout Patterns:
    - **row_major**: Standard layout, good for sequential access - **col_major**:
    Better for certain matrix operations - **blocked**: Cache-friendly blocked layouts
    - **interleaved**: For reducing bank conflicts Vectorization Strategies: - **none**:
    No vectorization (baseline) - **outer**: Vectorize outer loops (batch/head dimensions)
    - **inner**: Vectorize inner loops (sequence/feature dimensions) - **full**: Comprehensive
    vectorization across all suitable dimensions Fusion Patterns (Reduce Memory Traffic):
    - **producer**: Fuse operations with their producers - **consumer**: Fuse operations
    with their consumers - **both**: Aggressive fusion in both directions - **vertical**:
    Fuse across computation stages (QK -> softmax -> attention) - **horizontal**:
    Fuse across parallel operations Loop Optimizations: - **unroll_factor**: 1, 2,
    4, 8 (balance code size vs ILP) - **loop_interchange**: Reorder loops for better
    cache access - **loop_distribution**: Split loops for better optimization opportunities
    - **loop_skewing**: Transform loop bounds for parallelization Advanced Optimizations:
    - **prefetch_distance**: How far ahead to prefetch data (0-8) - **cache_strategy**:
    temporal, spatial, or mixed cache utilization - **shared_memory**: Use shared
    memory for GPU optimization - **pipeline_stages**: Number of pipeline stages for
    latency hiding Performance Targets: - **Baseline**: Standard attention implementation
    - **Target**: 32% speedup (1.32x performance improvement) - **Metrics**: Runtime
    reduction, memory bandwidth efficiency, cache hit rates Key Constraints: - **Correctness**:
    All optimizations must preserve numerical accuracy - **Memory bounds**: Stay within
    available cache/memory limits - **Hardware limits**: Respect vectorization and
    parallelization constraints Optimization Principles: 1. **Memory-bound workloads**:
    Focus on data layout and cache optimization 2. **Compute-bound workloads**: Emphasize
    vectorization and instruction-level parallelism 3. **Mixed workloads**: Balance
    memory and compute optimizations 4. **Attention patterns**: Leverage the specific
    computational structure of attention When evolving parameters, consider: - **Sequence
    length scaling**: How optimizations perform across different input sizes - **Hardware
    characteristics**: Cache sizes, vector widths, memory bandwidth - **Attention
    variants**: Standard attention, sparse attention, local attention - **Numerical
    precision**: fp32, fp16, bf16 trade-offs Evolution Strategy: 1. Start with fundamental
    optimizations (tiling, basic vectorization) 2. Add memory layout optimizations
    3. Explore fusion opportunities 4. Fine-tune advanced parameters 5. Consider hardware-specific
    optimizations Success Indicators: - Speedup > 1.0 (any improvement is progress)
    - Speedup > 1.15 (good optimization) - Speedup > 1.25 (excellent optimization)
    - Speedup > 1.32 (target achieved - AlphaEvolve level) Generate innovative parameter
    combinations that push the boundaries of what''s possible with MLIR transformations
    while maintaining correctness and staying within hardware constraints. '
  num_top_programs: 3
  use_template_stochasticity: true
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7
evaluator:
  timeout: 60
  cascade_evaluation: false
  cascade_thresholds:
  - 0.5
  - 0.75
  parallel_evaluations: 4
  use_llm_feedback: false
diff_based_evolution: true
allow_full_rewrites: false
max_code_length: 55000
search:
  strategy: tree_qd_mcts
  exploration_constant: 0.7
  qd_weight: 0.5
  max_tree_depth: 15
  backup: mixed
  backup_alpha: 0.5
  widening_alpha: 0.5
