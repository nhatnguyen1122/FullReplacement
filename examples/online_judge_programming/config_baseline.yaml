max_iterations: 20
checkpoint_interval: 1
log_level: INFO
llm:
  primary_model: codestral-latest
  primary_model_weight: 1.0
  api_base: https://api.mistral.ai/v1
  temperature: 0.7
  top_p: 0.95
  max_tokens: 4096
  provider: codestral
  max_total_tokens: 5000000
prompt:
  system_message: "You are an expert programmer. Your task is to implement an algorithm\
    \ in Python to pass all the test cases. The problem is as follows:\n\nA string\
    \ of lowercase letters is called alphabetical if some of the letters can be deleted\
    \ so that the only letters that remain are the letters from a to z in order. Given\
    \ a string s, determine the minimum number of letters to add anywhere in the string\
    \ to make it alphabetical.\n\nInput:\nEach input will consist of a single test\
    \ case. Note that your program may be run multiple times on different inputs.\
    \ The only line of input contains a string s (1 \u2264 |s| \u2264 50) which contains\
    \ only lowercase letters.\nOutput:\nOutput a single integer, which is the smallest\
    \ number of letters needed to add to s to make it alphabetical.\n\nSample Input\
    \ 1:\nxyzabcdefghijklmnopqrstuvw\nSample Output 1:\n3\n\nSample Input 2:\naiemckgobjfndlhp\n\
    Sample Output 2:\n20\n\nYour program should always read/write to STDIN/STDOUT.\
    \ For example, to handle integer input, use the following format:\n```\nimport\
    \ sys\nfor line in sys.stdin:\n    data = int(line)\n```\nUse print() for output.\
    \ For example:\n```\nprint(\"Hello, World!\")\n```\n"
  num_top_programs: 3
  use_template_stochasticity: true
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7
evaluator:
  timeout: 60
  cascade_evaluation: false
  cascade_thresholds:
  - 1.0
  parallel_evaluations: 4
  use_llm_feedback: false
diff_based_evolution: true
allow_full_rewrites: false
search:
  strategy: island_map_elites
