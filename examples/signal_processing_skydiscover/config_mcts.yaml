# TreeQD-MCTS config for the native SkyDiscover Signal Processing benchmark.
max_iterations: 50

llm:
  api_base: "https://integrate.api.nvidia.com/v1"
  api_key: ${NVIDIA_API_KEY}
  models:
    - name: "openai/gpt-oss-120b"
      weight: 1.0
  evaluator_models:
    - name: "openai/gpt-oss-120b"
      weight: 1.0
  temperature: 0.2
  max_tokens: 4096
  timeout: 600
  retries: 3
  retry_delay: 5
  max_total_tokens: 5000000

prompt:
  system_message: "You are an expert signal processing engineer specializing in adaptive filtering algorithms. This is the native SkyDiscover signal-processing benchmark, not the OpenEvolve-parity signal-processing benchmark. The evaluator calls run_signal_processing(noisy_signal=..., window_size=20); use the provided noisy_signal instead of generating a replacement signal. Return a filtered signal of length len(noisy_signal) - window_size + 1. Focus on the native SkyDiscover multi-objective score: slope change minimization, lag error minimization, tracking accuracy, false reversal penalty, clean-signal correlation, and noise reduction."
  num_top_programs: 3
  use_template_stochasticity: true

database:
  population_size: 80
  archive_size: 30
  num_islands: 4

evaluator:
  timeout: 120
  cascade_evaluation: true
  cascade_thresholds: [0.3, 0.6]
  parallel_evaluations: 4

diff_based_evolution: true
max_code_length: 60000

search:
  strategy: "tree_qd_mcts"
  exploration_constant: 0.7
  qd_weight: 0.5
  max_tree_depth: 15
  backup: "mixed"
  backup_alpha: 0.5
  widening_alpha: 0.5
