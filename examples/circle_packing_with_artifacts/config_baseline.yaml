llm:
  api_base: "https://integrate.api.nvidia.com/v1"
  api_key: ${NVIDIA_API_KEY}
  models:
    - name: "openai/gpt-oss-120b"
      weight: 1.0
  evaluator_models:
    - name: "openai/gpt-oss-120b"
      weight: 1.0
  temperature: 0.2
  max_tokens: 4096
  timeout: 600
  retries: 3
  retry_delay: 5
  max_total_tokens: 5000000
  
prompt:
  system_message: 'You are an expert mathematician specializing in circle packing
    problems and computational geometry.

    Your task is to improve a constructor function that places 26 circles in a unit
    square to maximize the sum of their radii.


    Target: AlphaEvolve achieved sum of radii = 2.635 for n=26.


    Key insights:

    - This is a constrained optimization problem with many local minima

    - Local optimization methods may get stuck - consider approaches that explore
    the solution space more broadly

    - Multiple starting points or perturbation strategies can help find better solutions

    - Good initial placements matter: hexagonal patterns, corner utilization, edge
    circles

    - The problem has 78 degrees of freedom (26 centers + 26 radii)


    Think about how to formulate this mathematically and what optimization strategies
    might help escape local minima.

    '
  num_top_programs: 3
  num_diverse_programs: 2
  include_artifacts: true
  max_artifact_bytes: 20480
database:
  population_size: 100
  archive_size: 50
  num_islands: 4
  elite_selection_ratio: 0.1
  exploration_ratio: 0.4
  exploitation_ratio: 0.5
  feature_dimensions:
  - radius_variance
  - spatial_spread
  feature_bins: 10
  migration_interval: 10
  migration_rate: 0.15
evaluator:
  timeout: 600
  max_retries: 3
  cascade_evaluation: true
  cascade_thresholds:
  - 0.5
  - 0.8
  parallel_evaluations: 4
  use_llm_feedback: false
  enable_artifacts: true
novelty:
  enabled: true
  embedding_backend: local
  embedding_model: all-MiniLM-L6-v2
  similarity_threshold: 0.95
  max_regeneration_attempts: 3
  temperature_increment: 0.15
search:
  strategy: island_map_elites
